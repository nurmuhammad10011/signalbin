<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SignalBin - Анализатор Бинарных Опционов</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #0a0e1a 0%, #0d1526 50%, #0a0e1a 100%);
  font-family: 'Inter', 'Segoe UI', sans-serif;
  color: #e0e6f0;
  padding: 24px 16px;
}
.container { max-width: 480px; margin: 0 auto; }
.header { text-align: center; margin-bottom: 28px; }
.live-dot {
  display: inline-block; width: 10px; height: 10px;
  border-radius: 50%; background: #00e676;
  box-shadow: 0 0 8px #00e676; animation: pulse 2s infinite;
  margin-right: 8px; vertical-align: middle;
}
.live-label { font-size: 12px; color: #00e676; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }
h1 {
  font-size: 26px; font-weight: 800; margin: 8px 0 4px;
  background: linear-gradient(90deg, #60a5fa, #a78bfa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.subtitle { color: #64748b; font-size: 13px; }
.section-label { font-size: 11px; color: #64748b; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; font-weight: 600; }
.section { margin-bottom: 20px; }
.btn-group { display: flex; flex-wrap: wrap; gap: 8px; }
.time-btn, .curr-btn {
  padding: 9px 14px; border-radius: 10px; border: 1.5px solid #1e2d47;
  background: #0f1929; color: #94a3b8; font-weight: 600; font-size: 13px;
  cursor: pointer; transition: all 0.2s;
}
.curr-btn { padding: 8px 12px; font-size: 12px; }
.time-btn.active {
  border-color: #60a5fa; background: linear-gradient(135deg, #1e3a5f, #1a2840);
  color: #60a5fa; box-shadow: 0 0 12px rgba(96,165,250,0.3);
}
.curr-btn.active {
  border-color: #a78bfa; background: linear-gradient(135deg, #2d1b4e, #1e1340);
  color: #a78bfa; box-shadow: 0 0 12px rgba(167,139,250,0.3);
}
.analyze-btn {
  width: 100%; padding: 16px; border-radius: 14px; border: none;
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
  letter-spacing: 0.5px; box-shadow: 0 4px 24px rgba(37,99,235,0.4);
  transition: all 0.3s; margin-bottom: 24px;
}
.analyze-btn:disabled { background: #1e2d47; color: #475569; box-shadow: none; cursor: not-allowed; }
.waiting {
  text-align: center; padding: 40px 20px;
  background: #0f1929; border-radius: 16px; border: 1px solid #1e2d47;
}
.waiting .icon { font-size: 40px; margin-bottom: 12px; }
.waiting p { color: #475569; font-size: 14px; line-height: 1.6; }
.result-main {
  border-radius: 18px; padding: 28px 24px; text-align: center; margin-bottom: 16px;
}
.result-up { background: linear-gradient(135deg, #052e16, #064e3b); border: 1.5px solid #16a34a; box-shadow: 0 0 40px rgba(22,163,74,0.2); }
.result-down { background: linear-gradient(135deg, #2d0a0a, #450a0a); border: 1.5px solid #dc2626; box-shadow: 0 0 40px rgba(220,38,38,0.2); }
.pair-label { font-size: 13px; color: #94a3b8; margin-bottom: 8px; }
.arrow { font-size: 64px; }
.direction { font-size: 28px; font-weight: 900; letter-spacing: 2px; margin: 8px 0 4px; }
.direction-up { color: #4ade80; }
.direction-down { color: #f87171; }
.chances { display: flex; gap: 12px; margin-top: 20px; justify-content: center; }
.chance-box { flex: 1; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 12px 8px; }
.chance-num { font-size: 22px; font-weight: 800; }
.chance-up { color: #4ade80; }
.chance-down { color: #f87171; }
.chance-label { font-size: 11px; color: #94a3b8; margin-top: 2px; }
.bar-wrap { margin-top: 16px; border-radius: 99px; overflow: hidden; height: 8px; background: #1e1e1e; }
.bar-fill { height: 100%; background: linear-gradient(90deg, #16a34a, #86efac); border-radius: 99px; transition: width 0.6s ease; }
.indicators { background: #0f1929; border-radius: 16px; padding: 20px; border: 1px solid #1e2d47; margin-bottom: 16px; }
.ind-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #1e2d47; }
.ind-row:last-child { border-bottom: none; }
.ind-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.ind-icon-up { background: rgba(22,163,74,0.15); border: 1px solid #16a34a; }
.ind-icon-down { background: rgba(220,38,38,0.15); border: 1px solid #dc2626; }
.ind-info { flex: 1; }
.ind-name { font-size: 13px; font-weight: 700; color: #e2e8f0; }
.ind-detail { font-size: 11px; color: #64748b; margin-top: 1px; }
.ind-strength { font-size: 13px; font-weight: 700; flex-shrink: 0; }
.str-up { color: #4ade80; }
.str-down { color: #f87171; }
.disclaimer { padding: 12px 16px; background: #0f1929; border-radius: 12px; border: 1px solid #1e2d47; text-align: center; }
.disclaimer p { font-size: 11px; color: #475569; line-height: 1.6; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div><span class="live-dot"></span><span class="live-label">Live Binarium Analyzer</span></div>
    <h1>Сигнальный Бот</h1>
    <p class="subtitle">Технический анализ по 5 индикаторам</p>
  </div>

  <div class="section">
    <div class="section-label">⏱ Время экспирации</div>
    <div class="btn-group" id="timeGroup">
      <button class="time-btn" data-val="1">1 мин</button>
      <button class="time-btn" data-val="2">2 мин</button>
      <button class="time-btn" data-val="3">3 мин</button>
      <button class="time-btn" data-val="5">5 мин</button>
      <button class="time-btn" data-val="60">1 час</button>
      <button class="time-btn" data-val="1440">1 день</button>
      <button class="time-btn" data-val="10080">1 нед</button>
    </div>
  </div>

  <div class="section">
    <div class="section-label">💱 Валютная пара</div>
    <div class="btn-group" id="currGroup">
      <button class="curr-btn" data-val="EUR/USD">EUR/USD</button>
      <button class="curr-btn" data-val="GBP/USD">GBP/USD</button>
      <button class="curr-btn" data-val="USD/JPY">USD/JPY</button>
      <button class="curr-btn" data-val="AUD/USD">AUD/USD</button>
      <button class="curr-btn" data-val="USD/CAD">USD/CAD</button>
      <button class="curr-btn" data-val="EUR/GBP">EUR/GBP</button>
      <button class="curr-btn" data-val="NZD/USD">NZD/USD</button>
      <button class="curr-btn" data-val="USD/CHF">USD/CHF</button>
      <button class="curr-btn" data-val="EUR/JPY">EUR/JPY</button>
      <button class="curr-btn" data-val="BTC/USD">BTC/USD</button>
      <button class="curr-btn" data-val="ETH/USD">ETH/USD</button>
      <button class="curr-btn" data-val="XRP/USD">XRP/USD</button>
      <button class="curr-btn" data-val="GBP/JPY">GBP/JPY</button>
      <button class="curr-btn" data-val="EUR/AUD">EUR/AUD</button>
      <button class="curr-btn" data-val="USD/MXN">USD/MXN</button>
    </div>
  </div>

  <button class="analyze-btn" id="analyzeBtn" disabled onclick="analyze()">🔍 АНАЛИЗ</button>

  <div id="output">
    <div class="waiting">
      <div class="icon">📈</div>
      <p>Выберите время и валюту,<br>затем нажмите «Анализ»</p>
    </div>
  </div>
</div>

<script>
let selectedTime = null, selectedCurrency = null;

document.querySelectorAll('.time-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedTime = btn.dataset.val;
    checkReady();
  };
});

document.querySelectorAll('.curr-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.curr-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedCurrency = btn.dataset.val;
    checkReady();
  };
});

function checkReady() {
  document.getElementById('analyzeBtn').disabled = !(selectedTime && selectedCurrency);
}

function generatePrices(n=60) {
  const p = [1.1000];
  for(let i=1;i<n;i++) p.push(+(p[i-1]+(Math.random()-0.495)*0.002).toFixed(5));
  return p;
}
function calcRSI(p,period=14) {
  if(p.length<period+1) return 50;
  let g=0,l=0;
  for(let i=p.length-period;i<p.length;i++){const d=p[i]-p[i-1];if(d>0)g+=d;else l+=Math.abs(d);}
  const ag=g/period,al=l/period;
  if(al===0)return 100;
  return +(100-100/(1+ag/al)).toFixed(2);
}
function calcMA(p,period) {
  if(p.length<period)return p[p.length-1];
  return +(p.slice(-period).reduce((a,b)=>a+b,0)/period).toFixed(5);
}
function calcMACD(p){return +(calcMA(p,12)-calcMA(p,26)).toFixed(5);}
function calcBoll(p,period=20) {
  if(p.length<period)return{upper:0,lower:0,mid:0};
  const s=p.slice(-period),mid=s.reduce((a,b)=>a+b,0)/period;
  const std=Math.sqrt(s.reduce((a,b)=>a+Math.pow(b-mid,2),0)/period);
  return{upper:+(mid+2*std).toFixed(5),lower:+(mid-2*std).toFixed(5),mid:+mid.toFixed(5)};
}
function calcStoch(p,period=14) {
  if(p.length<period)return 50;
  const s=p.slice(-period),h=Math.max(...s),l=Math.min(...s),c=p[p.length-1];
  if(h===l)return 50;
  return +(((c-l)/(h-l))*100).toFixed(2);
}

function analyze() {
  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true; btn.textContent = '⏳ Анализирую...';
  document.getElementById('output').innerHTML = '<div class="waiting"><div class="icon">⏳</div><p>Собираю данные индикаторов...</p></div>';
  setTimeout(() => {
    const p = generatePrices(60);
    const rsi=calcRSI(p), macd=calcMACD(p), ma20=calcMA(p,20), ma50=calcMA(p,50);
    const boll=calcBoll(p), stoch=calcStoch(p), cur=p[p.length-1];
    const signals=[];
    if(rsi<30) signals.push({name:'RSI',signal:'UP',strength:85,detail:`RSI=${rsi} (перепродан)`});
    else if(rsi>70) signals.push({name:'RSI',signal:'DOWN',strength:80,detail:`RSI=${rsi} (перекуплен)`});
    else signals.push({name:'RSI',signal:rsi<50?'DOWN':'UP',strength:55,detail:`RSI=${rsi} (нейтрал)`});
    signals.push({name:'MACD',signal:macd>0?'UP':'DOWN',strength:macd>0?70:68,detail:`MACD=${macd}`});
    if(ma20>ma50) signals.push({name:'MA Cross',signal:'UP',strength:75,detail:`MA20>MA50`});
    else signals.push({name:'MA Cross',signal:'DOWN',strength:72,detail:`MA20<MA50`});
    if(cur<boll.lower) signals.push({name:'Bollinger',signal:'UP',strength:82,detail:'Цена у нижней полосы'});
    else if(cur>boll.upper) signals.push({name:'Bollinger',signal:'DOWN',strength:79,detail:'Цена у верхней полосы'});
    else signals.push({name:'Bollinger',signal:cur>boll.mid?'DOWN':'UP',strength:52,detail:'Цена внутри полос'});
    if(stoch<20) signals.push({name:'Stochastic',signal:'UP',strength:78,detail:`Stoch=${stoch} (перепродан)`});
    else if(stoch>80) signals.push({name:'Stochastic',signal:'DOWN',strength:76,detail:`Stoch=${stoch} (перекуплен)`});
    else signals.push({name:'Stochastic',signal:stoch<50?'DOWN':'UP',strength:53,detail:`Stoch=${stoch} (нейтрал)`});
    const upW=signals.filter(s=>s.signal==='UP').reduce((a,b)=>a+b.strength,0);
    const dnW=signals.filter(s=>s.signal==='DOWN').reduce((a,b)=>a+b.strength,0);
    const total=upW+dnW, dir=upW>=dnW?'UP':'DOWN';
    const upC=Math.round((upW/total)*100), dnC=100-upC;
    const timeLabel = document.querySelector('.time-btn.active').textContent;

    let html = `
    <div class="result-main result-${dir.toLowerCase()}">
      <div class="pair-label">${selectedCurrency} · ${timeLabel}</div>
      <div class="arrow">${dir==='UP'?'▲':'▼'}</div>
      <div class="direction direction-${dir.toLowerCase()}">${dir==='UP'?'ВВЕРХ':'ВНИЗ'}</div>
      <div class="chances">
        <div class="chance-box"><div class="chance-num chance-up">${upC}%</div><div class="chance-label">▲ ВВЕРХ</div></div>
        <div class="chance-box"><div class="chance-num chance-down">${dnC}%</div><div class="chance-label">▼ ВНИЗ</div></div>
      </div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${upC}%"></div></div>
    </div>
    <div class="indicators">
      <div class="section-label">📊 Показания индикаторов</div>`;
    signals.forEach(s => {
      html += `<div class="ind-row">
        <div class="ind-icon ind-icon-${s.signal.toLowerCase()}">${s.signal==='UP'?'▲':'▼'}</div>
        <div class="ind-info"><div class="ind-name">${s.name}</div><div class="ind-detail">${s.detail}</div></div>
        <div class="ind-strength str-${s.signal.toLowerCase()}">${s.strength}%</div>
      </div>`;
    });
    html += `</div><div class="disclaimer"><p>⚠️ Анализ основан на технических индикаторах. Это не финансовый совет. Торговля несёт риски потери капитала.</p></div>`;
    document.getElementById('output').innerHTML = html;
    btn.disabled = false; btn.textContent = '🔍 АНАЛИЗ';
  }, 1800);
}
</script>
</body>
</html>
